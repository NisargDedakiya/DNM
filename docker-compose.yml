version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nisarghunter-db
    environment:
      POSTGRES_USER: nisarg
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nisarghunter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nisarg"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nisarghunter-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nisarghunter-api
    environment:
      APP_NAME: NisargHunterAI
      APP_VERSION: 1.0.0
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+asyncpg://nisarg:password@postgres:5432/nisarghunter
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HACKERONE_USERNAME: ${HACKERONE_USERNAME}
      HACKERONE_API_TOKEN: ${HACKERONE_API_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
