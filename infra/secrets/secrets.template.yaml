apiVersion: v1
kind: Secret
metadata:
  name: nisarghunter-secrets
type: Opaque
stringData:
  POSTGRES_USER: <postgres-user>
  POSTGRES_PASSWORD: <postgres-password>
  POSTGRES_DB: <postgres-db>
  DATABASE_URL: postgresql+asyncpg://<postgres-user>:<postgres-password>@postgres:5432/<postgres-db>
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: <jwt-secret>
  JWT_SECRET_KEY: <jwt-secret>
  AI_ROUTER_KEY: <ai-router-key>
  SSO_SAML_ISSUER: <saml-issuer>
  SSO_SAML_CERT: <saml-cert>
  SSO_OAUTH_CLIENT_ID: <oauth-client-id>
  SSO_OAUTH_CLIENT_SECRET: <oauth-client-secret>
  GOOGLE_WORKSPACE_CLIENT_ID: <google-client-id>
  GOOGLE_WORKSPACE_CLIENT_SECRET: <google-client-secret>
  MICROSOFT_ENTRA_CLIENT_ID: <entra-client-id>
  MICROSOFT_ENTRA_CLIENT_SECRET: <entra-client-secret>
  OKTA_CLIENT_ID: <okta-client-id>
  OKTA_CLIENT_SECRET: <okta-client-secret>
  GITHUB_ENTERPRISE_CLIENT_ID: <github-enterprise-client-id>
  GITHUB_ENTERPRISE_CLIENT_SECRET: <github-enterprise-client-secret>
