name: nisarghunter-ci-cd

on:
  push:
    branches:
      - main
      - release/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Backend tests
        run: pytest -q
      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f infra/docker/Dockerfile.backend -t ghcr.io/${{ github.repository }}/backend:${{ github.sha }} .
      - name: Build frontend image
        run: docker build -f infra/docker/Dockerfile.frontend -t ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} .

  security-scan:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          ignore-unfixed: true

  deploy:
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        run: echo "Configure cluster access via OIDC or kubeconfig secret outside repo"
      - name: Rollout backend
        run: kubectl rollout restart deployment/nisarghunter-backend
      - name: Rollout frontend
        run: kubectl rollout restart deployment/nisarghunter-frontend
      - name: Rollout workers
        run: kubectl rollout restart deployment/nisarghunter-workers
