global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000

  - job_name: workers
    metrics_path: /metrics
    static_configs:
      - targets:
          - workers:8000

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: websocket
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000
