apiVersion: apps/v1
kind: Deployment
metadata:
  name: nisarghunter-frontend
  labels:
    app: nisarghunter
    component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: nisarghunter
      component: frontend
  template:
    metadata:
      labels:
        app: nisarghunter
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/nisarghunter/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: nisarghunter
    component: frontend
spec:
  selector:
    app: nisarghunter
    component: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
