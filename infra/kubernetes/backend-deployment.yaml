apiVersion: apps/v1
kind: Deployment
metadata:
  name: nisarghunter-backend
  labels:
    app: nisarghunter
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: nisarghunter
      component: backend
  template:
    metadata:
      labels:
        app: nisarghunter
        component: backend
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: backend
          image: ghcr.io/nisarghunter/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: nisarghunter-secrets
          env:
            - name: PORT
              value: "8000"
            - name: HOST
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: nisarghunter
    component: backend
spec:
  selector:
    app: nisarghunter
    component: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
